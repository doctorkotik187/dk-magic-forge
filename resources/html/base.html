<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="dk-magic-forge: Where your projects are forged and made real">
    <title>Welcome to DK's Magic Forge</title>

    <link rel="icon" href="/img/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link href="/css/screen.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <!-- Navbar -->
    <nav>
        <div class="logo">
            <h2>DK's Magic Forge</h2>
        </div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/book-project">Book Project</a>
            <a href="/inbox">Inbox</a>
            <a href="/projects">Projects</a>
            <a href="/someday">Someday</a>
            <a href="/archives">Archives</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </div>
    </nav>

    <div class="content">
        {% if flash %}
          <div class="flash success">
            {{flash.message}}
          </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 DK's Magic Forge. All rights reserved.</p>
        <p>Made with fire, code, and magic.</p>
    </footer>
</body>
</html>
