{% extends "base.html" %}

{% block content %}

<!-- ===================== -->
<!-- FORGE CONTACT HEADER  -->
<!-- ===================== -->
<section class="hero is-medium forge-hero">
    <div class="hero-body has-text-centered">

        <p class="subtitle is-6">
            📡 Communication Channel // Forge Link
        </p>

        <h1 class="title is-1">
            Contact the Forge
        </h1>

        <p class="subtitle">
            Send a message into the system. It will be processed by the forge.
        </p>

    </div>
</section>

<!-- ===================== -->
<!-- CONTACT FORM          -->
<!-- ===================== -->
<section class="section">
    <div class="container" style="max-width: 700px;">

        <div class="card">
            <div class="card-content">

                <h2 class="title is-4">
                    ✉ Send a Message
                </h2>

                <form action="/contact" method="POST">
                    {% csrf-field %}

                    <!-- Name -->
                    <div class="field">
                        <label class="label">Your Name</label>
                        <div class="control">
                            <input class="input" type="text" name="name" placeholder="Enter your name" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="field">
                        <label class="label">Your Email</label>
                        <div class="control">
                            <input class="input" type="email" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <!-- Message -->
                    <div class="field">
                        <label class="label">Your Message</label>
                        <div class="control">
                            <textarea class="textarea" name="message" placeholder="Write your message" required></textarea>
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="field mt-4">
                        <div class="control">
                            <button type="submit" class="button is-warning is-fullwidth">
                                📜 Send into the Forge
                            </button>
                        </div>
                    </div>

                </form>

            </div>
        </div>

    </div>
</section>

{% endblock %}
