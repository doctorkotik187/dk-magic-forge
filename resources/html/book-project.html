{% extends "base.html" %}

{% block content %}
    <section class="hero">
        <h1>🔥 Book Your Project</h1>
        <p>Select your tech stack. Opt-in for live streaming discount. Let's build!</p>
    </section>

    <section class="booking-form">
        <h2>Project Details</h2>

        <form action="/book-project" method="POST">
            {% csrf-field %}

            <div class="form-group">
                <label for="project-name">Project Name <span class="required">*</span></label>
                <input type="text" id="project-name" name="project_name"
                       placeholder="e.g. My Killer App" maxlength="120" required />
            </div>

            <div class="form-group">
                <label for="project-description">Description <span class="required">*</span></label>
                <textarea id="project-description" name="project_description"
                          placeholder="What does it do?" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label for="tech-stack">Tech Stack</label>
                <select id="tech-stack" name="tech_stack">
                    <option value="clojure">🧬 Clojure</option>
                    <option value="rust">⚡ Rust</option>
                    <option value="ruby">💎 Ruby</option>
                    <option value="python">🐍 Python</option>
                </select>
            </div>

            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" name="streaming_option" />
                    🔓 Live Stream (50% discount: €0.50 instead of €1.00)
                </label>
            </div>

            <div class="form-group">
                <label>Deposit:</label>
                <strong>€1.00 (or €0.50 with streaming)</strong>
                <small>Non-refundable booking fee</small>
            </div>

            <button type="submit" class="cta-button">🚀 Book Project</button>
        </form>
    </div>
{% endblock %}
